<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM | Purple Clicker Ultimate v3.0</title>
    
    <!-- PWA PROTOKOLLERİ -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9333ea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- TAILWIND CSS MOTORU -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --purple-main: #9333ea;
            --purple-glow: rgba(147, 51, 234, 0.6);
            --purple-dark: #3b0764;
            --bg-color: #050510;
            --panel-bg: rgba(20, 15, 45, 0.85);
            --neon-pink: #f472b6;
            --light-intensity: 20px;
        }

        .omnilight-active {
            --bg-color: #0d0826;
            --panel-bg: rgba(26, 18, 54, 0.9);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(147, 51, 234, 0.15), transparent 60%),
                radial-gradient(circle at 10% 20%, rgba(76, 29, 149, 0.2), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.2), transparent 40%);
            box-shadow: inset 0 0 var(--light-intensity) rgba(168, 85, 247, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(76, 29, 149, 0.15), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.15), transparent 30%),
                linear-gradient(to bottom, #050510, #10051f);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            transition: background-color 0.5s ease;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.4); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--purple-main), var(--neon-pink)); border-radius: 10px; }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(147, 51, 234, 0.25);
            border-radius: 1.25rem;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.7);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .glass-panel:hover {
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 0 40px rgba(147, 51, 234, 0.25), 0 15px 50px rgba(0,0,0,0.8);
        }

        .clicker-btn {
            background: radial-gradient(circle at 35% 35%, #b55fe6, #581c87);
            border: 5px solid #f3e8ff;
            border-radius: 50%;
            width: 260px;
            height: 260px;
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            box-shadow: 
                0 0 calc(40px + var(--light-intensity)) var(--purple-glow), 
                inset 0 0 35px rgba(255, 255, 255, 0.4),
                0 25px 50px rgba(0,0,0,0.6);
            transition: transform 0.08s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 4px 12px rgba(0,0,0,0.8);
        }

        .clicker-btn:hover { transform: scale(1.02); }
        .clicker-btn:active { transform: scale(0.93); }

        .upgrade-btn {
            background: linear-gradient(90deg, rgba(88, 28, 135, 0.25) 0%, rgba(15, 12, 38, 0.6) 100%);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 0.85rem;
            transition: all 0.25s ease;
        }

        .upgrade-btn:hover:not(:disabled) {
            background: linear-gradient(90deg, rgba(124, 58, 237, 0.45) 0%, rgba(76, 29, 149, 0.5) 100%);
            border-color: #d8b4fe;
            transform: translateX(4px);
        }

        .upgrade-btn:disabled { opacity: 0.35; cursor: not-allowed; filter: grayscale(90%); }

        @keyframes float-up {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-140px) scale(1.6) rotate(12deg); opacity: 0; }
        }

        .floating-text {
            position: absolute;
            color: #f5f3ff;
            font-weight: 900;
            pointer-events: none;
            animation: float-up 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            text-shadow: 0 0 15px #a855f7, 0 0 4px #ffffff;
            z-index: 100;
        }

        .bar-transition { transition: width 0.25s ease, background-color 0.4s ease; }
        .neon-text { color: transparent; background-clip: text; -webkit-background-clip: text; background-image: linear-gradient(90deg, #f5f3ff, #d8b4fe, #a855f7); }
        .hidden-el { display: none !important; }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 30px; height: 30px;
            border-radius: 50%;
            border-left-color: #a855f7;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

                        <path fill="#FBBC05" d="M5.32 14.24A7.16 7.16 0 0 1 4.91 12c0-.79.13-1.57.38-2.31V6.54H1.21A11.94 11.94 0 0 0 0 12c0 1.92.45 3.74 1.21 5.46l4.11-3.22z"/>
                        <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.31 0 3.18 2.12 1.21 5.46l4.11 3.22c.94-2.85 3.57-4.93 6.68-4.93z"/>
                    </svg>
                    Google İle Devam Et

                <button id="offline-btn" class="w-full bg-slate-900 hover:bg-slate-850 text-gray-400 hover:text-white font-mono text-xs py-2.5 rounded-lg border border-purple-950/60 transition-all">

    <!-- ==========================================
         ANA OYUN EKRANI

    <div id="game-app" class="hidden-el w-full h-full flex flex-col lg:flex-row gap-4 p-2 lg:p-4">
        
        <!-- SOL PANEL -->
        <div class="glass-panel w-full lg:w-3/12 p-5 flex flex-col h-full gap-5">
            <div class="flex items-center justify-between bg-black/40 p-4 rounded-xl border border-purple-950">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="w-11 h-11 bg-gradient-to-br from-purple-600 to-indigo-800 rounded-lg flex items-center justify-center font-black text-xl border border-purple-400">

                    </div>
                </div>
                <button id="logout-btn" class="text-[10px] font-bold bg-red-950/60 border border-red-800/50 hover:bg-red-700 px-3 py-1.5 rounded-md text-white transition-all">ÇIKIŞ</button>
            </div>

            <div class="bg-purple-950/30 p-4 rounded-xl border border-purple-900/40 flex justify-between items-center">

            <div class="space-y-2 text-xs font-mono bg-black/40 p-4 rounded-xl border border-purple-950/70">

                <div class="flex justify-between"><span>Oto Kazanç / Sn:</span><span id="stat-auto-power" class="text-indigo-400 font-bold">0</span></div>

        <!-- ORTA PANEL -->
        <div class="glass-panel w-full lg:w-5/12 p-6 flex flex-col items-center justify-center relative min-h-[400px] lg:min-h-0">

                <button id="main-click-btn" class="clicker-btn">CORE</button>
            </div>
            
            <div id="cheat-warning" class="absolute bottom-6 text-red-500 font-bold text-xs font-mono hidden-el bg-red-950/90 px-4 py-2 rounded-lg border border-red-800">

                <div id="cooldown-timer" class="text-5xl font-mono font-black text-red-500 bg-red-950/80 px-8 py-4 rounded-xl border border-red-600/50">05:00</div>
            </div>
        </div>

        <!-- SAĞ PANEL (KARA BORSA) -->
        <div class="glass-panel w-full lg:w-4/12 flex flex-col overflow-hidden h-full">
            <div class="p-4 border-b border-purple-950 bg-black/20">
                <h3 class="text-lg font-black text-purple-300">KARA BORSA v3.0</h3>
            </div>
            <div id="shop-container" class="overflow-y-auto p-4 space-y-3 flex-grow"></div>
        </div>

    <!-- FIREBASE VE MOTOR SCRIPTİ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
            signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { 
            getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs 
        } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXyswOl4HWAUKfgyBk2jjNWMvaTLbou34",
            authDomain: "purple-clicker.firebaseapp.com",
            projectId: "purple-clicker",
            storageBucket: "purple-clicker.firebasestorage.app",
            messagingSenderId: "964233637279",
            appId: "1:964233637279:web:9e3adc46496f2a483b61aa"
        };

        let app, auth, db;
        let isOnlineMode = true;

        try {
            app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app);
        } catch (error) {
            isOnlineMode = false;
        }

        const googleProvider = new GoogleAuthProvider();

        let gameState = { score: 0, clickPower: 1, autoPower: 0, inventory: {} };
        let currentUser = null;
        let autoLoopInterval = null;
        let saveDebounceTimeout = null;
        
        let cheatStrikes = 0, isCheckingCheat = false, cheatClickCount = 0;
        let isOmniLightOpen = true, heartEnergy = 0, cooldownActive = false;

        const UPGRADES = [
            { id: "u1", name: "Kırık Fare", desc: "Tık gücü +1", baseCost: 15, power: 1, type: "click", icon: "🖱️" },
            { id: "u2", name: "Makro Scripti", desc: "Oto güç +1/sn", baseCost: 60, power: 1, type: "auto", icon: "📝" },
            { id: "u3", name: "Termux Kabuğu", desc: "Tık gücü +6", baseCost: 300, power: 6, type: "click", icon: "📟" },
            { id: "u4", name: "MT Manager Lisansı", desc: "Oto güç +12/sn", baseCost: 1200, power: 12, type: "auto", icon: "📁" },
            { id: "u5", name: "AndroidIDE Çekirdeği", desc: "Tık gücü +25", baseCost: 4500, power: 25, type: "click", icon: "📱" },
            { id: "u6", name: "Vercel Sunucu Kümesi", desc: "Oto güç +60/sn", baseCost: 18000, power: 60, type: "auto", icon: "☁️" },
            { id: "u7", name: "React Sanal DOM", desc: "Tık gücü +120", baseCost: 60000, power: 120, type: "click", icon: "⚛️" },
            { id: "u8", name: "Purple Hearts Modeli", desc: "Oto güç +250/sn", baseCost: 180000, power: 250, type: "auto", icon: "💜" },
            { id: "u9", name: "Mithril Yapay Dokusu", desc: "Tık gücü +600", baseCost: 450000, power: 600, type: "click", icon: "⚔️" },
            { id: "u10", name: "SGM Veri Ambarı", desc: "Oto güç +1.2K/sn", baseCost: 1200000, power: 1200, type: "auto", icon: "🏢" }
        ];

        // UI MAP ELEMANLARI (FIXED CORES)
        const UI = {
            screens: { auth: document.getElementById('auth-screen'), app: document.getElementById('game-app') },
            auth: {
                email: document.getElementById('email'), pass: document.getElementById('password'),
                loginBtn: document.getElementById('login-btn'), signupBtn: document.getElementById('signup-btn'),
                googleBtn: document.getElementById('google-login-btn'), offlineBtn: document.getElementById('offline-btn'),
                error: document.getElementById('auth-error')
            },
            game: {
                score: document.getElementById('main-score'), clickBtn: document.getElementById('main-click-btn'),
                clickArea: document.getElementById('click-area'), shop: document.getElementById('shop-container'),
                cooldownScreen: document.getElementById('cooldown-screen'), cooldownTimer: document.getElementById('cooldown-timer'),
                omniToggle: document.getElementById('omnilight-toggle'), heartBar: document.getElementById('heart-bar'),
                heartCount: document.getElementById('heart-count'), cheatWarning: document.getElementById('cheat-warning'),
                leaderboard: document.getElementById('leaderboard-container'), refreshLb: document.getElementById('refresh-lb'),
                logoutBtn: document.getElementById('logout-btn'), emailDisp: document.getElementById('player-email'),
                initialDisp: document.getElementById('player-initial'), syncDisp: document.getElementById('sync-status')
            }
        };

        function formatNumber(num) {
            if (num >= 1e6) return (num / 1e6).toFixed(2) + ' M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + ' K';
            return Math.floor(num).toString();
        }

        function showToast(title, message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `glass-panel p-4 flex flex-col border-l-4 min-w-[250px] bg-slate-950/95 text-xs`;
            toast.style.borderColor = type === 'success' ? '#22c55e' : (type === 'error' ? '#ef4444' : '#9333ea');
            toast.innerHTML = `<span class="font-black">${title}</span><span class="text-gray-300 mt-1">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateUI() {
            UI.game.score.innerText = formatNumber(gameState.score);
            document.getElementById('stat-click-power').innerText = formatNumber(gameState.clickPower);
            document.getElementById('stat-auto-power').innerText = formatNumber(gameState.autoPower);
            
            if (isOmniLightOpen) {
                let intensity = Math.min(gameState.clickPower * 2, 70);
                document.documentElement.style.setProperty('--light-intensity', intensity + 'px');
            } else {
                document.documentElement.style.setProperty('--light-intensity', '0px');
            }

            document.querySelectorAll('.up-btn-element').forEach(btn => {
                btn.disabled = gameState.score < parseInt(btn.dataset.cost);
            });
        }

        function renderShop() {
            UI.game.shop.innerHTML = '';
            UPGRADES.forEach(upg => {
                const count = gameState.inventory[upg.id] || 0;
                const cost = Math.floor(upg.baseCost * Math.pow(1.15, count));
                
                const btn = document.createElement('button');
                btn.className = 'upgrade-btn up-btn-element w-full p-3 flex items-center gap-3';
                btn.dataset.cost = cost;
                btn.disabled = gameState.score < cost;
                
                btn.innerHTML = `
                    <div class="text-2xl bg-black/50 p-2 rounded-xl">${upg.icon}</div>
                    <div class="flex-grow text-left">
                        <div class="font-bold text-xs text-gray-200">${upg.name} <span class="text-[9px] text-purple-400">Lv ${count}</span></div>
                        <div class="text-[10px] text-gray-400">${upg.desc}</div>
                        <div class="text-xs font-bold text-fuchsia-400 mt-0.5">💎 ${formatNumber(cost)}</div>
                    </div>
                `;
                btn.addEventListener('click', () => {
                    if (gameState.score >= cost) {
                        gameState.score -= cost;
                        gameState.inventory[upg.id] = count + 1;
                        if (upg.type === 'click') gameState.clickPower += upg.power;
                        if (upg.type === 'auto') gameState.autoPower += upg.power;
                        renderShop(); updateUI(); scheduleSave();
                    }
                });
                UI.game.shop.appendChild(btn);
            });
        }

        async function renderLeaderboard() {
            if (!isOnlineMode) return;
            try {
                const q = query(collection(db, "skorlar"), orderBy("puan", "desc"), limit(10));
                const snap = await getDocs(q);
                UI.game.leaderboard.innerHTML = '';
                let rank = 1;
                snap.forEach((doc) => {
                    const data = doc.data();
                    const name = data.email ? data.email.split('@')[0] : "Anonim";
                    const row = document.createElement('div');
                    row.className = `flex justify-between p-2 rounded bg-black/20 border border-purple-950 text-xs`;
                    row.innerHTML = `<span>${rank}. ${name}</span><span class="text-purple-400">${formatNumber(data.puan)}</span>`;
                    UI.game.leaderboard.appendChild(row);
                    rank++;
                });
            } catch (e) {}
        }

        // SGM-AC MOTORU
        setInterval(() => {
            if (cooldownActive) return;
            isCheckingCheat = true; cheatClickCount = 0;
            setTimeout(() => {
                isCheckingCheat = false;
                let cps = cheatClickCount / 3;
                let maxCps = 15 + (gameState.autoPower * 0.1);
                if (cps > maxCps) {
                    cheatStrikes++;
                    heartEnergy = 0;
                    if (cheatStrikes >= 3) {
                        cooldownActive = true;
                        UI.game.cooldownScreen.classList.remove('hidden-el');
                        console.error(`Rapor Gönderildi -> aftonpurpleguy560@gmail.com | Hız: ${cps} CPS`);
                        let left = 300;
                        const t = setInterval(() => {
                            left--;
                            UI.game.cooldownTimer.innerText = `${Math.floor(left/60).toString().padStart(2,'0')}:${(left%60).toString().padStart(2,'0')}`;
                            if (left <= 0) { clearInterval(t); cooldownActive = false; cheatStrikes = 0; UI.game.cooldownScreen.classList.add('hidden-el'); }
                        }, 1000);
                    } else {
                        showToast("SGM-AC UYARI", "Şüpheli tıklama hızı!", "error");
                    }
                }
            }, 3000);
        }, 10000);

        UI.game.clickBtn.addEventListener('click', (e) => {
            if (cooldownActive) return;
            if (isCheckingCheat) cheatClickCount++;
            gameState.score += gameState.clickPower;
            
            if (heartEnergy < 100) {
                heartEnergy = Math.min(heartEnergy + 2, 100);
                UI.game.heartBar.style.width = heartEnergy + '%';
                UI.game.heartCount.innerText = Math.floor(heartEnergy) + '%';
            }

            const txt = document.createElement('div');
            txt.className = 'floating-text';
            txt.style.left = `${e.clientX}px`; txt.style.top = `${e.clientY}px`;
            txt.innerText = `+${gameState.clickPower} 💜`;
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 1000);

            updateUI(); scheduleSave();
        });

        // RECOVERY & SAVE SGM HIERARCHY
        function scheduleSave() {
            if (cooldownActive) return;
            UI.game.syncDisp.innerText = 'Kaydediliyor...';
            if (saveDebounceTimeout) clearTimeout(saveDebounceTimeout);
            saveDebounceTimeout = setTimeout(async () => {
                localStorage.setItem('sgm_core_save', JSON.stringify(gameState));
                if (isOnlineMode && currentUser) {
                    // BUG DÜZELTME: Doküman ismi olarak random ID yerine 'user.uid' kullanıyoruz, böylece veriler ezilmiyor ve e-posta kaybolmuyor.
                    await setDoc(doc(db, "skorlar", currentUser.uid), {
                        puan: Math.floor(gameState.score),
                        clickPower: gameState.clickPower,
                        autoPower: gameState.autoPower,
                        inventory: gameState.inventory,
                        email: currentUser.email
                    }, { merge: true });
                    UI.game.syncDisp.innerText = 'Çevrimiçi';
                } else {
                    UI.game.syncDisp.innerText = 'Yerel Sandbox';
                }
            }, 1500);
        }

        function setupEnvironment() {
            UI.screens.auth.classList.add('hidden-el');
            UI.screens.app.classList.remove('hidden-el');
            updateUI(); renderShop(); renderLeaderboard();
            if (autoLoopInterval) clearInterval(autoLoopInterval);
            autoLoopInterval = setInterval(() => {
                if (gameState.autoPower > 0 && !cooldownActive) {
                    gameState.score += (gameState.autoPower / 10);
                    updateUI();
                }
            }, 100);
        }

        // AUTH EVENT TRIGGERS
        UI.auth.offlineBtn.addEventListener('click', () => {
            isOnlineMode = false;
            UI.game.emailDisp.innerText = "Yerel Sandbox";
            UI.game.initialDisp.innerText = "L";
            const raw = localStorage.getItem('sgm_core_save');
            if (raw) gameState = JSON.parse(raw);
            setupEnvironment();
        });

        if (isOnlineMode) {
            UI.auth.googleBtn.addEventListener('click', () => {
                signInWithPopup(auth, googleProvider).catch(e => { UI.auth.error.innerText = e.message; UI.auth.error.classList.remove('hidden-el'); });
            });
            UI.auth.loginBtn.addEventListener('click', () => {
                signInWithEmailAndPassword(auth, UI.auth.email.value, UI.auth.password.value).catch(e => { UI.auth.error.innerText = e.message; UI.auth.error.classList.remove('hidden-el'); });
            });
            UI.auth.signupBtn.addEventListener('click', () => {
                createUserWithEmailAndPassword(auth, UI.auth.email.value, UI.auth.password.value).catch(e => { UI.auth.error.innerText = e.message; UI.auth.error.classList.remove('hidden-el'); });
            });
            UI.game.logoutBtn.addEventListener('click', () => signOut(auth));

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    UI.game.emailDisp.innerText = user.email;
                    UI.game.initialDisp.innerText = user.email.charAt(0).toUpperCase();
                    
                    const snapshot = await getDoc(doc(db, "skorlar", user.uid));
                    if (snapshot.exists()) gameState = snapshot.data();
                    setupEnvironment();
                } else {
                    UI.screens.auth.classList.remove('hidden-el');
                    UI.screens.app.classList.add('hidden-el');
                }
            });
        }
    </script>
</body>
</html>
