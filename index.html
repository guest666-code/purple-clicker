<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM | Purple Clicker Ultimate v3</title>
    <!-- Manifest ve PWA Meta Etiketleri -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9333ea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --purple-main: #9333ea;
            --purple-glow: rgba(147, 51, 234, 0.6);
            --purple-dark: #3b0764;
            --bg-color: #050510;
            --panel-bg: rgba(20, 15, 45, 0.85);
            --neon-pink: #f472b6;
            --light-intensity: 0px; /* OmniLight için dinamik */
        }

        /* OmniLight Işık Modu Etkisi */
        .omnilight-active {
            --bg-color: #0c0822;
            --panel-bg: rgba(30, 20, 60, 0.9);
            box-shadow: inset 0 0 var(--light-intensity) rgba(168, 85, 247, 0.4);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(76, 29, 149, 0.15), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.15), transparent 30%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 1.2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            transition: all 0.3s ease;
        }

        /* Ana Tıklama Butonu & Parla Efekti */
        .clicker-btn {
            background: radial-gradient(circle at 30% 30%, #a855f7, #6b21a8);
            border: 4px solid #e9d5ff;
            border-radius: 50%;
            width: 250px;
            height: 250px;
            box-shadow: 0 0 calc(30px + var(--light-intensity)) var(--purple-glow);
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .clicker-btn:active { transform: scale(0.95); }

        /* Uçan Parçacık Animasyonu */
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            animation: float-up 1s ease-out forwards;
            text-shadow: 0 0 10px #a855f7;
            z-index: 50;
        }

        /* Mor Kalp Barı */
        .heart-bar-fill {
            transition: width 0.2s ease, background-color 0.3s;
        }

        .banned-btn {
            background: #111 !important;
            border-color: #ef4444 !important;
            color: #ef4444 !important;
            cursor: not-allowed !important;
        }

        .hidden-el { display: none !important; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 gap-4" id="main-body">

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 flex items-center justify-center z-40 bg-black/90 backdrop-blur-md">
        <div class="glass-panel p-8 w-full max-w-md">
            <h1 class="text-4xl font-black text-center mb-6 text-purple-400 tracking-wider">SGM OS v3</h1>
            <div class="space-y-4">
                <input type="email" id="email" class="w-full bg-slate-900 border border-purple-800 rounded p-3 text-white" placeholder="E-Posta">
                <input type="password" id="password" class="w-full bg-slate-900 border border-purple-800 rounded p-3 text-white" placeholder="Şifre">
                <div class="flex gap-2">
                    <button id="login-btn" class="flex-1 bg-purple-600 font-bold py-3 rounded">GİRİŞ</button>
                    <button id="signup-btn" class="flex-1 border border-purple-600 rounded">KAYIT</button>
                </div>
                <button id="offline-btn" class="w-full bg-gray-800 text-gray-300 font-bold py-2 rounded mt-2 text-sm border border-gray-700">İnternetsiz Devam Et (Yerel Kayıt)</button>
            </div>
            <div id="auth-error" class="text-red-400 text-sm text-center mt-4 hidden-el bg-red-950/50 p-2 rounded"></div>
        </div>
    </div>

    <!-- GAME APP -->
    <div id="game-app" class="hidden-el w-full h-full flex flex-col md:flex-row gap-4">
        
        <!-- SOL PANEL -->
        <div class="glass-panel w-full md:w-3/12 p-4 flex flex-col gap-4">
            <div class="flex justify-between items-center bg-black/30 p-3 rounded-lg">
                <div class="truncate font-bold text-sm" id="player-email">Yerel Oyuncu</div>
                <button id="logout-btn" class="text-xs bg-red-900/50 px-2 py-1 rounded text-red-300">ÇIKIŞ</button>
            </div>

            <!-- OmniLight & Tema Kontrolü -->
            <div class="bg-purple-950/40 p-3 rounded-lg border border-purple-800/60 flex justify-between items-center">
                <span class="text-xs font-bold text-purple-300">OmniLight Sistemi</span>
                <button id="omnilight-toggle" class="bg-purple-700 hover:bg-purple-600 text-[10px] px-3 py-1.5 rounded font-black tracking-wide transition">AÇIK</button>
            </div>

            <!-- Purple Hearts (Sağlık / Hız Barı) -->
            <div class="bg-black/40 p-4 rounded-lg border border-purple-900/40">
                <div class="flex justify-between text-xs font-bold text-purple-400 mb-2">
                    <span>💜 Purple Hearts Enerjisi</span>
                    <span id="heart-count">0%</span>
                </div>
                <div class="w-full bg-slate-950 h-3 rounded-full overflow-hidden p-0.5 border border-purple-900">
                    <div id="heart-bar" class="heart-bar-fill bg-purple-500 h-full w-0 rounded-full shadow-[0_0_10px_#9333ea]"></div>
                </div>
            </div>

            <div class="space-y-2 text-sm font-mono bg-black/20 p-3 rounded-lg">
                <div class="flex justify-between"><span>Tık Gücü:</span> <span id="stat-click-power" class="text-purple-400">1</span></div>
                <div class="flex justify-between"><span>Oto / Sn:</span> <span id="stat-auto-power" class="text-indigo-400">0</span></div>
                <div class="flex justify-between"><span>Ağ:</span> <span id="sync-status" class="text-green-400">Çevrimiçi</span></div>
            </div>

            <div class="flex-grow overflow-y-auto" id="leaderboard-container"></div>
        </div>

        <!-- ORTA PANEL -->
        <div class="glass-panel w-full md:w-5/12 p-6 flex flex-col items-center justify-center relative">
            <div id="main-score" class="text-6xl font-black font-mono mb-8 text-center tracking-tighter">0</div>
            
            <div id="click-area">
                <button id="main-click-btn" class="clicker-btn font-black text-2xl text-white">TIKLA!</button>
            </div>

            <div id="cooldown-screen" class="absolute inset-0 bg-black/95 backdrop-blur-md flex flex-col items-center justify-center hidden-el p-6 text-center z-30 rounded-xl">
                <h2 class="text-red-500 font-black text-3xl mb-2 tracking-widest">🛑 SGM-AC KİLİTLENMESİ</h2>
                <p class="text-gray-400 text-sm max-w-sm mb-6 font-mono">Güvenlik Protokolü Devreye Girdi. Aşırı tıklama hızı algılandı.</p>
                <div id="cooldown-timer" class="text-5xl font-mono font-black text-red-400 bg-red-950/50 px-6 py-3 rounded-lg border border-red-500/50">05:00</div>
            </div>
        </div>

        <!-- SAĞ PANEL -->
        <div class="glass-panel w-full md:w-4/12 flex flex-col overflow-hidden">
            <div class="p-4 bg-black/20 font-black border-b border-purple-900/50 text-purple-300">KARA BORSA v3</div>
            <div id="shop-container" class="overflow-y-auto p-4 space-y-2 flex-grow"></div>
        </div>
    </div>

    <!-- JAVASCRIPT MOTORU -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXyswOl4HWAUKfgyBk2jjNWMvaTLbou34",
            authDomain: "purple-clicker.firebaseapp.com",
            projectId: "purple-clicker",
            storageBucket: "purple-clicker.firebasestorage.app",
            messagingSenderId: "964233637279",
            appId: "1:964233637279:web:9e3adc46496f2a483b61aa"
        };

        let app, auth, db;
        let isOnlineMode = true;

        try {
            app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app);
        } catch(e) {
            isOnlineMode = false;
            console.log("Çevrimdışı mod aktif edildi.");
        }

        let gameState = { score: 0, clickPower: 1, autoPower: 0, inventory: {} };
        let currentUser = null;
        let autoInterval = null, saveTimeout = null;
        
        // --- SGM-AC & MEKANİK DEĞİŞKENLERİ ---
        let cheatStrikes = 0;
        let isCheckingCheat = false;
        let cheatClickCount = 0;
        let isOmniLightOpen = true;
        let heartEnergy = 0;
        let cooldownActive = false;

        const UPGRADES = [
            { id: "u1", name: "Kırık Fare", baseCost: 15, power: 1, type: "click" },
            { id: "u2", name: "Basit Script", baseCost: 50, power: 1, type: "auto" },
            { id: "u3", name: "MT Manager Modu", baseCost: 500, power: 10, type: "auto" }
        ];

        const UI = {
            screens: { auth: document.getElementById('auth-screen'), app: document.getElementById('game-app') },
            auth: { email: document.getElementById('email'), pass: document.getElementById('password'), loginBtn: document.getElementById('login-btn'), signupBtn: document.getElementById('signup-btn'), offlineBtn: document.getElementById('offline-btn'), error: document.getElementById('auth-error') },
            game: { score: document.getElementById('main-score'), clickBtn: document.getElementById('main-click-btn'), clickArea: document.getElementById('click-area'), shop: document.getElementById('shop-container'), cooldownScreen: document.getElementById('cooldown-screen'), cooldownTimer: document.getElementById('cooldown-timer'), omniToggle: document.getElementById('omnilight-toggle'), heartBar: document.getElementById('heart-bar'), heartCount: document.getElementById('heart-count') }
        };

        function showToast(title, msg, type='info') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `glass-panel p-3 border-l-4 ${type==='error'?'border-red-500':'border-purple-500'} bg-slate-900/95 text-xs`;
            t.innerHTML = `<b class="block uppercase">${title}</b><span class="font-mono text-gray-400">${msg}</span>`;
            container.appendChild(t);
            setTimeout(() => { t.remove(); }, 3500);
        }

        function calculateCost(base, count) { return Math.floor(base * Math.pow(1.15, count)); }

        function updateUI() {
            UI.game.score.innerText = Math.floor(gameState.score).toLocaleString();
            document.getElementById('stat-click-power').innerText = gameState.clickPower;
            document.getElementById('stat-auto-power').innerText = gameState.autoPower;
            
            // OmniLight Parlama Şiddetini Ayarla
            if(isOmniLightOpen) {
                let intensity = Math.min(gameState.clickPower * 2, 60);
                document.documentElement.style.setProperty('--light-intensity', intensity + 'px');
            } else {
                document.documentElement.style.setProperty('--light-intensity', '0px');
            }

            document.querySelectorAll('.up-btn').forEach(btn => {
                btn.disabled = gameState.score < parseInt(btn.dataset.cost);
            });
        }

        // --- AKILLI CPS HESAPLAMA MOTORU (SGM-AC) ---
        setInterval(() => {
            if (cooldownActive) return;
            isCheckingCheat = true;
            cheatClickCount = 0;

            setTimeout(() => {
                isCheckingCheat = false;
                let cps = cheatClickCount / 3;
                
                // Akıllı Limit: Temel limit 15 CPS + (Oto üretimin %10'u kadar tolerans marjı)
                let dynamicMaxCps = 15 + (gameState.autoPower * 0.1);

                if (cps > dynamicMaxCps) {
                    triggerCheatProtocol(cps);
                }
            }, 3000);
        }, 10000);

        function triggerCheatProtocol(cps) {
            cheatStrikes++;
            
            // Enerji barını tehlike rengine çek ve patlat
            heartEnergy = 0;
            UI.game.heartBar.style.width = '0%';
            UI.game.heartBar.style.backgroundColor = '#ef4444';

            if (cheatStrikes === 1) {
                showToast("⚠️ SGM-AC UYARI 1", "Bizim olmayan bir clicker algılandı! Lütfen kapat.", "error");
            } else if (cheatStrikes === 2) {
                showToast("⚠️ SGM-AC UYARI 2", "Bir daha yaparsan admine bildiririm!", "error");
            } else if (cheatStrikes >= 3) {
                startCooldownTimeout(cps);
            }
        }

        // --- 5 DAKİKALIK GEÇİCİ BAN (COOLDOWN) PROTOKOLÜ ---
        function startCooldownTimeout(cps) {
            cooldownActive = true;
            UI.game.cooldownScreen.classList.remove('hidden-el');
            showToast("🛑 PROTOKOL 560", "Bu kadar yeter posta gönderiliyor...", "error");
            
            // Admine Mail Bildirimi Simülasyonu
            console.error(`🔴 ADMİN BİLDİRİMİ SENT TO: aftonpurpleguy560@gmail.com | Sebep: Hile tespit edildi. Hız: ${cps} CPS`);

            let timeLeft = 300; // 5 dakika = 300 saniye
            const timer = setInterval(() => {
                timeLeft--;
                let min = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                let sec = (timeLeft % 60).toString().padStart(2, '0');
                UI.game.cooldownTimer.innerText = `${min}:${sec}`;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    cooldownActive = false;
                    cheatStrikes = 0;
                    UI.game.cooldownScreen.classList.add('hidden-el');
                    showToast("SİSTEM AKTİF", "Güvenlik kilidi kaldırıldı.", "success");
                }
            }, 1000);
        }

        // --- PURPLE HEARTS ENERJİ BAR MEKANİĞİ ---
        UI.game.clickBtn.addEventListener('click', (e) => {
            if (cooldownActive) return;
            if (isCheckingCheat) cheatClickCount++;

            gameState.score += gameState.clickPower;
            
            // Enerji barını doldur (Tıklama hızı dinamizmi)
            if(heartEnergy < 100) {
                heartEnergy = Math.min(heartEnergy + 2, 100);
                UI.game.heartBar.style.width = heartEnergy + '%';
                UI.game.heartCount.innerText = heartEnergy + '%';
                UI.game.heartBar.style.backgroundColor = '#a855f7';
            }

            // Tıklama Parçacık Yazısı
            const txt = document.createElement('div');
            txt.className = 'floating-text font-black text-2xl';
            txt.style.left = e.clientX + 'px'; txt.style.top = e.clientY + 'px';
            txt.innerText = `+${gameState.clickPower} 💜`;
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 1000);

            updateUI();
            scheduleSave();
        });

        // Enerji Zamanla Azalır
        setInterval(() => {
            if(heartEnergy > 0 && !cooldownActive) {
                heartEnergy = Math.max(heartEnergy - 5, 0);
                UI.game.heartBar.style.width = heartEnergy + '%';
                UI.game.heartCount.innerText = heartEnergy + '%';
            }
        }, 1000);

        // OmniLight Aç/Kapa Anahtarı
        UI.game.omniToggle.addEventListener('click', () => {
            isOmniLightOpen = !isOmniLightOpen;
            UI.game.omniToggle.innerText = isOmniLightOpen ? "AÇIK" : "KAPALI";
            UI.game.omniToggle.className = isOmniLightOpen ? "bg-purple-700 text-[10px] px-3 py-1.5 rounded font-black" : "bg-gray-700 text-[10px] px-3 py-1.5 rounded font-black";
            if(isOmniLightOpen) document.getElementById('main-body').classList.add('omnilight-active');
            else document.getElementById('main-body').classList.remove('omnilight-active');
            updateUI();
        });

        // --- MAĞAZA MOTORU ---
        function renderShop() {
            UI.game.shop.innerHTML = '';
            UPGRADES.forEach(u => {
                let count = gameState.inventory[u.id] || 0;
                let cost = calculateCost(u.baseCost, count);
                let btn = document.createElement('button');
                btn.className = 'up-btn w-full bg-black/40 border border-purple-900/60 p-3 rounded-xl flex justify-between items-center text-xs font-mono disabled:opacity-40';
                btn.dataset.cost = cost;
                btn.innerHTML = `<div><b>${u.name}</b> (Lvl ${count})</div><div class="text-fuchsia-400 font-bold">${cost} Puan</div>`;
                btn.addEventListener('click', () => {
                    if(gameState.score >= cost) {
                        gameState.score -= cost;
                        gameState.inventory[u.id] = count + 1;
                        if(u.type === 'click') gameState.clickPower += u.power;
                        if(u.type === 'auto') gameState.autoPower += u.power;
                        renderShop(); updateUI(); scheduleSave();
                    }
                });
                UI.game.shop.appendChild(btn);
            });
        }

        // --- KAYIT & OFFLINE MOTORU ---
        function scheduleSave() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('sgm_local_save', JSON.stringify(gameState));
                if(isOnlineMode && currentUser) {
                    setDoc(doc(db, "skorlar", currentUser.uid), { puan: gameState.score, clickPower: gameState.clickPower, autoPower: gameState.autoPower, inventory: gameState.inventory, email: currentUser.email }, { merge: true });
                }
            }, 2000);
        }

        function loadLocalData() {
            let local = localStorage.getItem('sgm_local_save');
            if(local) {
                gameState = JSON.parse(local);
                updateUI(); renderShop();
            }
        }

        // Çevrimdışı Mod Butonu Tetikleyicisi
        UI.auth.offlineBtn.addEventListener('click', () => {
            isOnlineMode = false;
            document.getElementById('sync-status').innerText = "Çevrimdışı Mod";
            document.getElementById('sync-status').className = "text-yellow-500";
            UI.screens.auth.classList.add('hidden-el');
            UI.screens.app.classList.remove('hidden-el');
            loadLocalData();
            renderShop();
            startAutoLoop();
        });

        function startAutoLoop() {
            if(autoInterval) clearInterval(autoInterval);
            autoInterval = setInterval(() => {
                if(gameState.autoPower > 0 && !cooldownActive) {
                    gameState.score += (gameState.autoPower / 10);
                    updateUI();
                }
            }, 100);
        }

        if(isOnlineMode) {
            onAuthStateChanged(auth, (user) => {
                if(user) {
                    currentUser = user;
                    UI.screens.auth.classList.add('hidden-el');
                    UI.screens.app.classList.remove('hidden-el');
                    document.getElementById('player-email').innerText = user.email;
                    getDoc(doc(db, "skorlar", user.uid)).then(snap => {
                        if(snap.exists()) gameState = snap.data();
                        updateUI(); renderShop(); startAutoLoop();
                    });
                }
            });
            UI.auth.loginBtn.addEventListener('click', () => {
                signInWithEmailAndPassword(auth, UI.auth.email.value, UI.auth.pass.value).catch(e => { UI.auth.error.innerText = e.message; UI.auth.error.classList.remove('hidden-el'); });
            });
            UI.auth.signupBtn.addEventListener('click', () => {
                createUserWithEmailAndPassword(auth, UI.auth.email.value, UI.auth.pass.value).catch(e => { UI.auth.error.innerText = e.message; UI.auth.error.classList.remove('hidden-el'); });
            });
            document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
        }

        // PWA Kurulum Kontrolü
        window.addEventListener('load', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Aktif."));
            }
        });
    </script>
</body>
</html>
