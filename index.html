    <!-- ==========================================
         SGM CSS MOTORU (Genişletilmiş Animasyonlar)
         ========================================== -->
    <style>
        :root {
            --purple-main: #9333ea;
            --purple-glow: rgba(147, 51, 234, 0.6);
            --purple-dark: #3b0764;
            --bg-color: #050510;
            --panel-bg: rgba(20, 15, 45, 0.85);
            --neon-pink: #f472b6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(76, 29, 149, 0.15), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.15), transparent 30%),
                linear-gradient(to bottom, #050510, #10051f);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* Özel Kaydırma Çubuğu */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: var(--purple-main); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-pink); }

        /* Cam Efektli Paneller */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 1.2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            transition: all 0.4s ease;
        }

        .glass-panel:hover {
            border-color: rgba(168, 85, 247, 0.7);
            box-shadow: 0 10px 50px var(--purple-glow);
        }

        /* Ana Tıklama Butonu */
        .clicker-btn {
            background: radial-gradient(circle at 30% 30%, #a855f7, #6b21a8);
            border: 4px solid #e9d5ff;
            border-radius: 50%;
            width: 280px;
            height: 280px;
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            box-shadow: 
                0 0 50px var(--purple-glow), 
                inset 0 0 30px rgba(255,255,255,0.4),
                0 20px 40px rgba(0,0,0,0.6);
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 4px 10px rgba(0,0,0,0.7);
            position: relative;
            z-index: 10;
        }

        .clicker-btn:hover {
            box-shadow: 
                0 0 80px rgba(168, 85, 247, 0.9), 
                inset 0 0 40px rgba(255,255,255,0.6),
                0 30px 50px rgba(0,0,0,0.8);
            transform: scale(1.03);
        }

        .clicker-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 20px var(--purple-glow);
        }

        /* Mağaza Butonları */
        .upgrade-btn {
            background: linear-gradient(90deg, rgba(88, 28, 135, 0.3) 0%, rgba(30, 27, 75, 0.5) 100%);
            border: 1px solid rgba(147, 51, 234, 0.4);
            border-radius: 0.75rem;
            padding: 1rem;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .upgrade-btn:hover:not(:disabled) {
            background: linear-gradient(90deg, rgba(124, 58, 237, 0.5) 0%, rgba(76, 29, 149, 0.6) 100%);
            border-color: #c084fc;
            transform: translateX(5px);
        }

        .upgrade-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(80%);
        }

        /* Animasyonlar */
        @keyframes float-up {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.8) rotate(10deg); opacity: 0; }
        }

        .floating-text {
            position: absolute;
            color: #e9d5ff;
            font-weight: 900;
            font-size: 2.5rem;
            pointer-events: none;
            animation: float-up 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            text-shadow: 0 0 15px #a855f7, 0 0 5px white;
            z-index: 50;
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 10px #7c3aed; }
            50% { text-shadow: 0 0 40px #c084fc, 0 0 20px white; }
            100% { text-shadow: 0 0 10px #7c3aed; }
        }

        .score-text {
            font-family: 'Consolas', 'Courier New', monospace;
            animation: pulse-glow 3s infinite;
        }

        @keyframes slide-in-toast {
            0% { transform: translateX(120%) scale(0.9); opacity: 0; }
            100% { transform: translateX(0) scale(1); opacity: 1; }
        }

        .toast-enter { 
            animation: slide-in-toast 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        .hidden-el { display: none !important; }
        
        .neon-text {
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            background-image: linear-gradient(to right, #e9d5ff, #c084fc, #9333ea);
        }
        
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 40px; height: 40px;
            border-radius: 50%;
            border-left-color: #c084fc;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Ban Ekranı Efekti */
        .banned-btn {
            background: #1a1a1a !important;
            border-color: #ff0000 !important;
            color: #ff0000 !important;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5) !important;
            cursor: not-allowed !important;
            transform: scale(0.95) !important;
        }
    </style>
</head>

            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let borderCol = type === 'success' ? 'border-green-500' : (type === 'error' ? 'border-red-500' : 'border-purple-500');
            let textCol = type === 'success' ? 'text-green-400' : (type === 'error' ? 'text-red-400' : 'text-purple-400');
            
            toast.className = `toast-enter glass-panel p-4 flex flex-col border-l-4 min-w-[280px] ${borderCol} bg-slate-900/90`;
            toast.innerHTML = `<span class="font-black text-sm tracking-wide ${textCol} uppercase">${title}</span>
                               <span class="text-gray-300 text-xs mt-1 font-mono">${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function calculateCost(baseCost, count) { return Math.floor(baseCost * Math.pow(1.15, count)); }
        function showError(msg) {
            UI.auth.error.textContent = msg; UI.auth.error.classList.remove('hidden-el');
            setTimeout(() => UI.auth.error.classList.add('hidden-el'), 5000);
        }

        // 8. ARAYÜZ GÜNCELLEME (RENDER)
        function updateUI() {
            UI.game.score.innerText = formatNumber(gameState.score);
            UI.stats.clickPower.innerText = formatNumber(gameState.clickPower);
            UI.stats.autoPower.innerText = formatNumber(gameState.autoPower);
            
            document.querySelectorAll('.upgrade-btn').forEach(btn => {
                const cost = parseInt(btn.dataset.currentCost);
                btn.disabled = gameState.score < cost;
            });
        }

        function renderShop() {
            UI.game.shop.innerHTML = '';
            UPGRADES.forEach(upg => {
                const count = gameState.inventory[upg.id] || 0;
                const cost = calculateCost(upg.baseCost, count);
                
                const btn = document.createElement('button');
                btn.className = 'upgrade-btn w-full';
                btn.dataset.id = upg.id; btn.dataset.currentCost = cost;
                if (gameState.score < cost) btn.disabled = true;
                
                btn.innerHTML = `
                    <div class="text-4xl bg-black/40 p-3 rounded-lg border border-purple-900/50 shadow-inner">${upg.icon}</div>
                    <div class="flex-grow text-left">
                        <div class="font-bold text-gray-100 text-sm tracking-wide">${upg.name} <span class="bg-purple-900/60 text-purple-300 text-[10px] px-2 py-0.5 rounded ml-2 border border-purple-700/50">Lvl ${count}</span></div>
                        <div class="text-[11px] text-gray-400 mt-1">${upg.desc}</div>
                        <div class="text-xs font-mono font-bold text-fuchsia-400 mt-2">💎 ${formatNumber(cost)} Puan</div>
                    </div>
                `;
                btn.addEventListener('click', () => buyUpgrade(upg.id));
                UI.game.shop.appendChild(btn);
            });
        }

        async function renderLeaderboard() {
            UI.game.leaderboard.innerHTML = '<div class="text-center text-purple-500 mt-4 spinner mx-auto"></div>';
            try {
                const q = query(collection(db, "skorlar"), orderBy("puan", "desc"), limit(25));
                const snap = await getDocs(q);
                UI.game.leaderboard.innerHTML = '';
                
                let rank = 1;
                snap.forEach((doc) => {
                    const data = doc.data();
                    const emailPre = data.email.split('@')[0];
                    const isMe = currentUser && currentUser.email === data.email;
                    
                    const item = document.createElement('div');
                    item.className = `flex justify-between items-center p-3 rounded-lg mb-2 transition-all ${isMe ? 'bg-gradient-to-r from-purple-900/80 to-indigo-900/80 border border-purple-400 shadow-[0_0_15px_rgba(147,51,234,0.3)]' : 'bg-black/40 border border-gray-800'}`;
                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <span class="${rank <= 3 ? 'text-yellow-400 font-black' : 'text-gray-500 font-bold'} w-5 text-right">${rank}.</span>
                            <span class="${isMe ? 'text-white font-bold' : 'text-gray-300'} text-xs truncate max-w-[100px]">${emailPre}</span>
                        </div>
                        <span class="text-fuchsia-400 font-black text-xs bg-black/50 px-2 py-1 rounded">${formatNumber(data.puan)}</span>
                    `;
                    UI.game.leaderboard.appendChild(item);
                    rank++;
                });
            } catch (err) {
                console.error("Tablo hatası:", err);
                UI.game.leaderboard.innerHTML = '<div class="text-red-400 text-xs text-center">Bağlantı koptu.</div>';
            }
        }

        // ==========================================
        // 9. ANTI-CHEAT (HİLE KORUMASI) MOTORU
        // ==========================================
        
        // Her 10 saniyede bir, 3 saniyelik test başlat
        setInterval(() => {
            if (!currentUser || isBanned) return; 
            
            isCheckingCheat = true;
            cheatClickCount = 0;

            // 3 saniye sonra kontrolü bitir ve hızı hesapla
            setTimeout(() => {
                isCheckingCheat = false;
                let cps = cheatClickCount / 3; // Clicks Per Second

                if (cps > MAX_CPS) {
                    hileyiYakala(cps);
                }
            }, 3000);
        }, 10000);

        function hileyiYakala(cps) {
            cheatStrikes++;
            UI.game.cheatWarning.classList.remove('hidden-el');
            setTimeout(() => UI.game.cheatWarning.classList.add('hidden-el'), 2000);

            if (cheatStrikes === 1) {
                showToast("⚠️ SGM ANTI-CHEAT", `Bizim olmayan bir clicker kullanıyorsun! Hızın: ${cps.toFixed(1)} CPS. Lütfen kapat.`, "error");
            } 
            else if (cheatStrikes === 2) {
                showToast("⚠️ SGM ANTI-CHEAT (UYARI 2)", "Bir daha yaparsan admine bildiririm! Oto-clicker'ı hemen kapat.", "error");
            } 
            else if (cheatStrikes >= 3) {
                isBanned = true;
                showToast("🛑 HESAP KİLİTLENDİ", "Bu kadar yeter posta gönderiliyor...", "error");
                
                // Oyuncunun daha fazla tıklamasını kalıcı olarak engelle
                UI.game.clickBtn.classList.add('banned-btn');
                UI.game.clickBtn.innerHTML = '<span class="text-4xl text-red-500">BANLANDIN</span>';
                
                // Admin'e mail gönderme simülasyonu
                adminMailGonder(cps);
            }
        }

        function adminMailGonder(cps) {
            const hileciEmail = currentUser ? currentUser.email : "Bilinmeyen";
            
            // Gerçek projede buraya EmailJS (emailjs.send) kodları gelir.
            // SGM Adminine (aftonpurpleguy560@gmail.com) bildirim gönderilir.
            console.log("%c 🔴 SGM GÜVENLİK PROTOKOLÜ DEVREDE ", "background: red; color: white; font-size: 16px; font-weight: bold;");
            console.log(`Hedef Email: aftonpurpleguy560@gmail.com`);
            console.log(`Konu: Hile Tespit Edildi (SGM Anti-Cheat)`);
            console.log(`Mesaj: Sistemde 3. kez oto-clicker kullanan bir oyuncu tespit edildi.`);
            console.log(`Oyuncu: ${hileciEmail}`);
            console.log(`Son Tespit Edilen Hız: ${cps.toFixed(1)} CPS`);
            console.log("------------------------------------------");
        }

        // ==========================================
        // 10. OYUN MEKANİKLERİ VE TIKLAMA
        // ==========================================

        UI.game.clickBtn.addEventListener('click', (e) => {
            // ANTI-CHEAT: Eğer oyuncu banlandıysa hiçbir işlem yapma
            if (isBanned) return;

            // ANTI-CHEAT: Eğer sistem test modundaysa tıklamayı say
            if (isCheckingCheat) {
                cheatClickCount++;
            }

            gameState.score += gameState.clickPower;
            gameState.totalClicks += 1;
            
            createFloatingText(e, `+${formatNumber(gameState.clickPower)}`);
            updateUI();
            scheduleSave();
        });

        function buyUpgrade(upgradeId) {
            if (isBanned) return; // Banlıysa alışveriş de yapamaz
            
            const upgrade = UPGRADES.find(u => u.id === upgradeId);
            const count = gameState.inventory[upgradeId] || 0;
            const cost = calculateCost(upgrade.baseCost, count);

            if (gameState.score >= cost) {
                gameState.score -= cost;
                gameState.inventory[upgradeId] = count + 1;
                
                if (upgrade.type === 'click') gameState.clickPower += upgrade.power;
                if (upgrade.type === 'auto') gameState.autoPower += upgrade.power;
                
                showToast("Yükseltme Başarılı", `${upgrade.name} seviye atladı!`, 'success');
                renderShop(); 
                updateUI();
                scheduleSave();
            }
        }

        function startAutoClicker() {
            if (autoClickerInterval) clearInterval(autoClickerInterval);
            autoClickerInterval = setInterval(() => {
                if (gameState.autoPower > 0 && !isBanned) {
                    gameState.score += (gameState.autoPower / 10); // Saniyede 10 kere tetiklenir, smooth artış sağlar
                    updateUI();
                    if (Math.random() < 0.05) scheduleSave(); // Rastgele aralıklarla otomatik kayıt
                }
            }, 100);
        }

        function createFloatingText(e, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            const rect = UI.game.clickArea.getBoundingClientRect();
            // Tıklanan yere göre rastgelelik kat
            const x = e.clientX - rect.left + (Math.random() * 60 - 30);
            const y = e.clientY - rect.top + (Math.random() * 40 - 20);
            
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            UI.game.clickArea.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        // ==========================================
        // 11. VERİTABANI (FIRESTORE) İŞLEMLERİ
        // ==========================================
        
        function scheduleSave() {
            if (isBanned) return; // Banlıysa kaydetme
            
            UI.stats.sync.innerHTML = '<div class="w-2 h-2 bg-yellow-500 rounded-full"></div> Kaydediliyor...';
            UI.stats.sync.classList.replace('text-green-400', 'text-yellow-400');
            
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => saveGameData(), 2500); // 2.5 sn bekleyip kaydeder
        }

        async function saveGameData() {
            if (!currentUser) return;
            try {
                const userRef = doc(db, "skorlar", currentUser.uid);
                await setDoc(userRef, {
                    puan: Math.floor(gameState.score),
                    email: currentUser.email,
                    clickPower: gameState.clickPower,
                    autoPower: gameState.autoPower,
                    inventory: gameState.inventory,
                    sonGuncelleme: new Date(),
                    banDurumu: isBanned // Ban durumunu da sunucuya yazıyoruz
                }, { merge: true });
                
                UI.stats.sync.innerHTML = '<div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div> Çevrimiçi';
                UI.stats.sync.classList.replace('text-yellow-400', 'text-green-400');
            } catch (err) {
                console.error("Kayıt hatası:", err);
                UI.stats.sync.innerHTML = '<div class="w-2 h-2 bg-red-500 rounded-full"></div> Hata!';
                UI.stats.sync.classList.replace('text-yellow-400', 'text-red-400');
            }
        }

        async function loadGameData(user) {
            try {
                const userRef = doc(db, "skorlar", user.uid);
                const docSnap = await getDoc(userRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    // Sunucudan banlı geldiyse hemen kitle
                    if (data.banDurumu) {
                        isBanned = true;
                        UI.game.clickBtn.classList.add('banned-btn');
                        UI.game.clickBtn.innerHTML = '<span class="text-4xl text-red-500">BANLANDIN</span>';
                        showToast("HESAP YASAKLI", "Bu hesap hile sebebiyle sunucudan kilitlenmiştir.", "error");
                    }
                    
                    gameState.score = data.puan || 0;
                    gameState.clickPower = data.clickPower || 1;
                    gameState.autoPower = data.autoPower || 0;
                    gameState.inventory = data.inventory || {};
                    showToast("SGM OS Başlatıldı", "Profil verileri başarıyla yüklendi.", "success");
                } else {
                    showToast("SGM Ağına Hoş Geldin", "Yeni oyuncu profili oluşturuldu.", "success");
                }
                
                updateUI();
                renderShop();
                startAutoClicker();
                renderLeaderboard();
                
            } catch (err) {
                showToast("Sistem Hatası", "Veritabanı bağlantısı kurulamadı.", "error");
            }
        }

        // ==========================================
        // 12. AUTH (KİMLİK DOĞRULAMA) OLAYLARI
        // ==========================================

        UI.auth.signupBtn.addEventListener('click', () => {
            const e = UI.auth.email.value; const p = UI.auth.pass.value;
            if(!e || !p) return showError("Protokol hatası: Boş alan bırakılamaz.");
            createUserWithEmailAndPassword(auth, e, p).catch(err => showError(err.message));
        });

        UI.auth.loginBtn.addEventListener('click', () => {
            const e = UI.auth.email.value; const p = UI.auth.pass.value;
            if(!e || !p) return showError("Protokol hatası: Boş alan bırakılamaz.");
            signInWithEmailAndPassword(auth, e, p).catch(err => showError(err.message));
        });

        UI.auth.googleBtn.addEventListener('click', () => {
            signInWithPopup(auth, googleProvider).catch(err => showError(err.message));
        });

        UI.game.logoutBtn.addEventListener('click', () => signOut(auth));
        UI.game.refreshLb.addEventListener('click', () => {
            UI.game.refreshLb.classList.add('animate-spin');
            renderLeaderboard().then(() => UI.game.refreshLb.classList.remove('animate-spin'));
        });

        // Durum Dinleyicisi
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                UI.screens.auth.classList.add('hidden-el');
                UI.screens.app.classList.remove('hidden-el');
                
                UI.stats.email.textContent = user.email;
                UI.stats.initial.textContent = user.email.charAt(0).toUpperCase();
                
                loadGameData(user);
            } else {
                currentUser = null;
                clearInterval(autoClickerInterval);
                isBanned = false; // Çıkış yapınca ban durumunu resetle (görsel olarak)
                UI.game.clickBtn.classList.remove('banned-btn');
                UI.game.clickBtn.innerHTML = 'TIKLA!';
                
                gameState = { score: 0, totalClicks: 0, clickPower: 1, autoPower: 0, inventory: {}, achievementsUnlocked: [] };
                
                UI.screens.auth.classList.remove('hidden-el');
                UI.screens.app.classList.add('hidden-el');
            }
        });

        console.log("%c SGM PURPLE CLICKER ULTIMATE V2 BAŞLATILDI ", "background: #9333ea; color: #fff; font-size: 18px; font-weight: bold; border-radius: 8px; padding: 4px;");
        console.log("%c ANTI-CHEAT MODÜLÜ: AKTİF ", "color: #22c55e; font-weight: bold;");
    </script>
</body>
</html>
